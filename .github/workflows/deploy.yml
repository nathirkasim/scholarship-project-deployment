name: Build & Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 954930678370.dkr.ecr.us-east-1.amazonaws.com
  API_REPO: scholarship-api
  WEB_REPO: scholarship-web
  ML_REPO: scholarship-ml
  ASG_NAME: nathir-webapp-asg

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. AWS Credentials ──────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. ECR Login ─────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Set image tag (short SHA) ─────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── 5. Build & push API image ────────────────────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.API_REPO }}:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.API_REPO }}:latest

      # ── 6. Build & push Web image ────────────────────────────────────────
      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.WEB_REPO }}:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.WEB_REPO }}:latest

      # ── 7. Build & push ML image ─────────────────────────────────────────
      - name: Build & push ML service
        uses: docker/build-push-action@v5
        with:
          context: ml-service
          file: ml-service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ML_REPO }}:${{ steps.tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ML_REPO }}:latest

      # ── 8. Resolve instance ID from ASG ──────────────────────────────────
      - name: Get EC2 instance ID from ASG
        id: get-instance
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ env.ASG_NAME }}" \
            --query "AutoScalingGroups[0].Instances[?HealthStatus=='Healthy'] | [0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No healthy instance found in ASG ${{ env.ASG_NAME }}"
            exit 1
          fi

          echo "Found instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT

      # ── 9. Deploy via SSM ─────────────────────────────────────────────────
      - name: Deploy via SSM
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.INSTANCE_ID }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA::8}" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu/app",
              "echo === [$(date)] Pulling latest code ===",
              "sudo -u ubuntu git pull origin main",
              "echo === [$(date)] Logging into ECR ===",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 954930678370.dkr.ecr.us-east-1.amazonaws.com",
              "echo === [$(date)] Pulling new images ===",
              "docker compose pull web api ml-service",
              "echo === [$(date)] Restarting app containers (db/redis/minio untouched) ===",
              "docker compose up -d --no-deps web api ml-service",
              "echo === [$(date)] Waiting for containers to stabilize ===",
              "sleep 20",
              "docker compose ps",
              "echo === [$(date)] Running prisma migrate deploy ===",
              "docker compose exec -T api npx prisma migrate deploy 2>&1 || true",
              "echo === [$(date)] Cleaning up old images ===",
              "docker image prune -f",
              "echo === [$(date)] Deploy complete ==="
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      # ── 10. Wait & print output ───────────────────────────────────────────
      - name: Wait for deploy to complete
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.INSTANCE_ID }}"

          echo "Waiting for SSM command $COMMAND_ID to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          echo "=== Deploy Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status: Status, Output: StandardOutputContent, Error: StandardErrorContent}" \
            --output json

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "ERROR: Deploy failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy succeeded."
