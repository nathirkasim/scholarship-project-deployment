services:
  # ── Web Frontend (Next.js 14) ────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: scholarship_web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - API_INTERNAL_URL=http://api:4000
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - scholarship_net
    ports:
      - "3000:3000"

  # ── Backend API (Node.js + Express) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: scholarship_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:5000
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-scholarship-docs}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - scholarship_net
    ports:
      - "4000:4000"

  # ── ML Service (Python + FastAPI) ────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: scholarship_ml
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - MODEL_DIR=/app/models/saved
    volumes:
      - ml_models:/app/models/saved
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scholarship_net
    ports:
      - "5000:5000"

  # ── One-time Setup (DB push, seed, MinIO bucket) ──────────────────────
  setup:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: scholarship_setup
    restart: "no"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-scholarship-docs}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - scholarship_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Step 1: Push Prisma schema ==="
        npx prisma db push --skip-generate

        echo "=== Step 2: Compile seed ==="
        npx tsc --module commonjs --target ES2022 --esModuleInterop --skipLibCheck --outDir /tmp /app/prisma/seed.ts
        cp /tmp/seed.js /app/seed.js

        echo "=== Step 3: Run seed ==="
        node /app/seed.js

        echo "=== Step 4: Create MinIO bucket ==="
        node -e "const Minio = require('minio'); const client = new Minio.Client({ endPoint: 'minio', port: 9000, useSSL: false, accessKey: process.env.MINIO_ACCESS_KEY, secretKey: process.env.MINIO_SECRET_KEY }); const bucket = process.env.MINIO_BUCKET || 'scholarship-docs'; client.bucketExists(bucket).then(exists => { if (exists) { console.log('Bucket already exists'); process.exit(0); } return client.makeBucket(bucket, 'ap-south-1'); }).then(() => { console.log('Bucket created: ' + bucket); process.exit(0); }).catch(err => { console.error('MinIO error:', err.message); process.exit(1); });"

        echo "=== Setup complete ==="

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: scholarship_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-scholarship}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-scholarship_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scholarship_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarship}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scholarship_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - scholarship_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (Object Storage) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: scholarship_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - scholarship_net
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: scholarship_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
      - ml-service
    networks:
      - scholarship_net
    ports:
      - "80:80"
      - "443:443"

networks:
  scholarship_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ml_models:
